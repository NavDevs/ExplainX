<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-card">
    <div class="header">
      <img src="icons/icon128.jpg" alt="logo" class="logo">
      <h1>ExplainX</h1>
    </div>
    
    <div class="content">
      <p>AI-powered insights for all your browsing.</p>
      
      <div class="features">
        <div class="feature-item">
          <span class="dot"></span>
          <span>Highlight text to explain</span>
        </div>
        <div class="feature-item">
          <span class="dot"></span>
          <span>AI Chat interface</span>
        </div>
        <div class="feature-item">
          <span class="dot"></span>
          <span>History persistent</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <button id="optionsBtn" class="action-btn">
        <span class="icon">⚙️</span> Settings
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
